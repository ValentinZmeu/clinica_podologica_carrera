# Plesk deployment - builds locally from source code
# Usage: docker compose -f docker-compose.plesk.yml up -d --build --remove-orphans && docker system prune -af

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica_podologica_carrera_v2-web
    labels:
      com.project.stack: clinica_podologica_carrera_v2
      com.project.role: web
    restart: unless-stopped
    ports:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - contact-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  contact-data:
    driver: local
name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Docker exige el nombre de imagen en minúsculas; hardcodeamos para evitar
  # que ${{ github.repository }} (que conserva mayúsculas) rompa el pull.
  IMAGE_NAME: valentinzmeu/clinica_podologica_carrera

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "${{ secrets.APP_PATH }}"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail

            # Cambiar al directorio del proyecto (falla con set -e si APP_PATH no existe)
            cd "${{ secrets.APP_PATH }}"

            # Verificar que docker-compose.prod.yml existe antes de seguir
            if [ ! -f docker-compose.prod.yml ]; then
              echo "::error::docker-compose.prod.yml no encontrado en $(pwd)"
              ls -la
              exit 1
            fi

            # Login en GHCR con Personal Access Token (read:packages)
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u valentinzmeu --password-stdin

            # Pull de la imagen
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Levantar con la nueva imagen (recrea contenedor si hay cambios)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Limpieza de imágenes/contenedores/redes/cache sin uso
            docker system prune -af --volumes --filter "label!=com.docker.compose.project"

            # Estado final
            docker compose -f docker-compose.prod.yml ps

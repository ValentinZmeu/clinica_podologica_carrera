# =============================================================================
# DIRECTIVAS NGINX ADICIONALES — Clínica Podológica Carrera
# Plesk > Dominios > clinica-podologica-carrera.ES > Configuración Apache & nginx
# Campo: "Additional nginx directives"  (DOMINIO CANÓNICO)
# =============================================================================
#
# DOMINIOS:
#   - .es  → canónico. Proxy al container Docker (este bloque).
#   - .com → alias, debe redirigir 301 a .es. Ver bloque al final del archivo
#           ("DIRECTIVAS PARA EL DOMINIO .com").
#
# IMPORTANTE: Estas directivas van en el bloque server{} de nginx.
# Las zonas de rate limiting (limit_req_zone) deben ir en el contexto http{}:
# añadirlas en /etc/nginx/conf.d/rate_limit.conf en el servidor.
# =============================================================================


# --- Redirect www → apex (consolidar canonical) ------------------------------
#
# El subdominio www.clinica-podologica-carrera.es resuelve al mismo VPS que el
# apex y, sin esta regla, serviría contenido duplicado. Forzamos 301 al apex
# para que Google consolide las señales SEO en una sola URL canónica.

if ($host = "www.clinica-podologica-carrera.es") {
    return 301 https://clinica-podologica-carrera.es$request_uri;
}


# --- Proxy principal: Next.js en Docker (puerto 32771) -----------------------

location / {
    proxy_pass         http://127.0.0.1:32771;
    proxy_http_version 1.1;

    # WebSocket (Next.js HMR en dev, posibles actualizaciones en tiempo real)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Cabeceras del cliente real
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # Bypass caché en WebSocket
    proxy_cache_bypass $http_upgrade;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    send_timeout          60s;

    # Buffers (equilibrio SSR Next.js: páginas medianas, respuestas rápidas)
    proxy_buffering        on;
    proxy_buffer_size      8k;
    proxy_buffers          16 4k;
    proxy_busy_buffers_size 16k;
    proxy_max_temp_file_size 0;

    # Ocultar info del backend
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Reintentar solo en fallos de conexión (no en errores de app)
    proxy_next_upstream error timeout http_502 http_503 http_504;

    # -------------------------------------------------------------------------
    # Cabeceras de seguridad
    # -------------------------------------------------------------------------

    # Evitar clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Evitar MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # HSTS: forzar HTTPS durante 1 año (activar solo con HTTPS estable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Controlar información de referrer enviada a terceros
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restringir APIs del navegador no usadas por la clínica
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Content-Security-Policy básica para Next.js + Google Analytics + Maps
    # Ajusta los dominios si añades fuentes externas adicionales
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com https://maps.gstatic.com https://maps.googleapis.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com; frame-src https://www.google.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;
}


# --- Bloquear archivos sensibles ---------------------------------------------

location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|conf|bak|backup|old|orig|tmp|DS_Store)$ {
    deny all;
    return 404;
}

# Bloquear rutas de administración de WordPress/PHP (escaneos comunes)
location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|\.php)$ {
    deny all;
    return 404;
}

# Evitar acceso directo a archivos dot (excluir .well-known para ACME/SSL)
location ~ /\.(?!well-known) {
    deny all;
    return 404;
}


# =============================================================================
# OPCIONAL: Rate limiting
# Requiere definir estas zonas en /etc/nginx/conf.d/rate_limit.conf:
#
#   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
#   limit_req_zone $binary_remote_addr zone=static:10m  rate=50r/s;
#
# Una vez definidas, descomenta los limit_req dentro de location /.
# =============================================================================
#
# Ejemplo dentro de location /:
#   limit_req zone=general burst=40 nodelay;
#   limit_req_status 429;



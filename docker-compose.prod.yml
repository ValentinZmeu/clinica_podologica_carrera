# Production docker-compose - uses pre-built image from GHCR
# Usage: docker compose -f docker-compose.prod.yml up -d

name: clinica_podologica_carrera_v2

services:
  web:
    image: ghcr.io/valentinzmeu/clinica_podologica_carrera:latest
    container_name: clinica_podologica_carrera_v2-web
    labels:
      com.project.stack: clinica_podologica_carrera_v2
      com.project.role: web
    restart: unless-stopped
    ports:
      # Puerto host fijado a 32771 para que la Plesk Proxy Rule no se desincronice
      # al recrear el container. Ver docs/plans/_archive/12-fix-puerto-fijo-plesk.md
      - "32771:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - contact-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  contact-data:
    driver: local

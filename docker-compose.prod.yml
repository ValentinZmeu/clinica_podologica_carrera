# Production docker-compose - uses pre-built image from GHCR
# Usage: docker compose -f docker-compose.prod.yml up -d

name: clinica_podologica_carrera_v2

services:
  web:
    image: ghcr.io/valentinzmeu/clinica_podologica_carrera:latest
    container_name: clinica_podologica_carrera_v2-web
    labels:
      com.project.stack: clinica_podologica_carrera_v2
      com.project.role: web
    restart: unless-stopped
    ports:
      # Bind local-only para evitar exposición externa en 0.0.0.0.
      # Prioridad de resolución del puerto host: .env (DOCKER_WEB_HOST_PORT) > CI vars/secrets > default.
      # Ver workflow de deploy para la cadena de fallback en runtime.
      - "127.0.0.1:${DOCKER_WEB_HOST_PORT:-32771}:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - contact-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  contact-data:
    driver: local
